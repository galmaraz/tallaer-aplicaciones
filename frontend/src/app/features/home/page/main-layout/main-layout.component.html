<div class="relative min-h-screen overflow-hidden text-white font-sans
            bg-gradient-to-br from-[#070418] via-[#0a0724] to-[#120833]">

  <!-- Capa de degradado radial (fija) para profundidad -->
  <div class="pointer-events-none fixed inset-0 z-0
              bg-[radial-gradient(ellipse_at_top_left,_rgba(99,102,241,0.28),_transparent_55%),radial-gradient(ellipse_at_bottom_right,_rgba(168,85,247,0.22),_transparent_55%),radial-gradient(ellipse_at_center,_rgba(59,130,246,0.10),_transparent_70%)]">
  </div>

  <!-- Blobs animados -->
  <div class="blob-group pointer-events-none fixed inset-0 -z-10">
    <div class="blob-1 absolute -top-40 -left-40 w-[700px] h-[700px] rounded-full bg-purple-500/60 blur-[90px] will-change-transform"></div>
    <div class="blob-2 absolute top-1/4 -right-60 w-[650px] h-[650px] rounded-full bg-indigo-500/55 blur-[90px] will-change-transform"></div>
    <div class="blob-3 absolute -bottom-40 left-1/3 w-[800px] h-[800px] rounded-full bg-fuchsia-600/50 blur-[100px] will-change-transform"></div>
    <div class="blob-4 absolute top-1/2 left-10 w-[450px] h-[450px] rounded-full bg-blue-500/55 blur-[80px] will-change-transform"></div>
    <div class="blob-5 absolute top-10 right-1/4 w-[400px] h-[400px] rounded-full bg-cyan-400/40 blur-[70px] will-change-transform"></div>
  </div>

  <!-- Grain sutil -->
  <div class="pointer-events-none fixed inset-0 z-10 opacity-[0.04] mix-blend-overlay"
    style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><filter id=%22n%22><feTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22/></filter><rect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/></svg>');">
  </div>

  <!--HEADER  -->
  <header class="fixed top-0 inset-x-0 h-16 z-30 flex items-center gap-4 px-4
                 bg-white/[0.05] backdrop-blur-3xl backdrop-saturate-150
                 border-b border-white/[0.1]
                 shadow-[inset_0_1px_0_0_rgba(255,255,255,0.12),inset_0_-1px_0_0_rgba(255,255,255,0.02),0_8px_32px_rgba(0,0,0,0.35)]">

    <!-- Hamburguesa → toggle sidebar -->
    <button (click)="toggleSidebar()"
      class="p-2.5 rounded-xl hover:bg-white/[0.08] active:bg-white/[0.12] transition-all"
      [title]="sidebarOpen() ? 'Cerrar menú' : 'Abrir menú'">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>

    <h1 class="font-bold text-lg leading-tight w-24 shrink-0
               bg-gradient-to-r from-purple-300 via-violet-300 to-indigo-300 bg-clip-text text-transparent">
      NoteFlow
    </h1>

    <!-- Barra de búsqueda funcional -->
    <div class="flex-1 max-w-2xl mx-auto relative">
      <svg class="absolute left-5 top-1/2 -translate-y-1/2 pointer-events-none transition-colors"
        [class]="filterService.searchQuery() ? 'text-purple-400/80' : 'text-white/40'"
        xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" /><path d="m21 21-4.35-4.35" />
      </svg>

      <input type="text" placeholder="Buscar notas..."
        [value]="filterService.searchQuery()"
        (input)="filterService.searchQuery.set($any($event.target).value)"
        class="w-full py-3 rounded-full text-sm text-white placeholder:text-white/40
               bg-white/[0.06] border border-white/[0.14]
               backdrop-blur-3xl backdrop-saturate-150
               shadow-[inset_0_1px_0_0_rgba(255,255,255,0.12),inset_0_-1px_2px_0_rgba(0,0,0,0.15)]
               focus:outline-none focus:border-purple-400/50 focus:bg-white/[0.09]
               focus:shadow-[inset_0_1px_0_0_rgba(255,255,255,0.15),0_0_0_3px_rgba(139,92,246,0.18)]
               transition-all"
        [class]="filterService.searchQuery() ? 'pl-12 pr-10' : 'pl-12 pr-5'" />

      <!-- Botón limpiar búsqueda -->
      @if (filterService.searchQuery()) {
        <button (click)="filterService.searchQuery.set('')"
          class="absolute right-4 top-1/2 -translate-y-1/2 p-0.5 rounded-full
                 text-white/50 hover:text-white hover:bg-white/[0.10] transition-all">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18" /><path d="m6 6 12 12" />
          </svg>
        </button>
      }
    </div>

    <!-- Avatar usuario -->
    <app-user-switcher />
  </header>

  <!--  SIDEBAR  -->
  <aside class="sidebar-anim fixed left-0 top-16 bottom-0 w-64 p-3 z-20
                bg-white/[0.04] backdrop-blur-3xl backdrop-saturate-150
                border-r border-white/[0.1]
                shadow-[inset_1px_0_0_0_rgba(255,255,255,0.08),4px_0_32px_rgba(0,0,0,0.25)]"
    [style.transform]="sidebarOpen() ? 'translateX(0)' : 'translateX(-100%)'">

    <nav class="flex flex-col gap-1 mt-2">

      <!-- Notas-->
      <a routerLink="/" [routerLinkActiveOptions]="{exact: true}"
        routerLinkActive="!bg-gradient-to-r !from-purple-500/25 !to-indigo-500/15 !text-white !border-purple-400/40 !shadow-[inset_0_1px_0_0_rgba(255,255,255,0.15),0_2px_12px_rgba(139,92,246,0.2)]"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-white/70
               border border-transparent hover:bg-white/[0.06] hover:text-white transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5" />
          <path d="M9 18h6" /><path d="M10 22h4" />
        </svg>
        <span>Notas</span>
      </a>

      <!-- Recordatorios -->
      <a routerLink="/recordatorios"
        routerLinkActive="!bg-gradient-to-r !from-purple-500/25 !to-indigo-500/15 !text-white !border-purple-400/40 !shadow-[inset_0_1px_0_0_rgba(255,255,255,0.15),0_2px_12px_rgba(139,92,246,0.2)]"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-white/70
               border border-transparent hover:bg-white/[0.06] hover:text-white transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
          <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
        </svg>
        <span>Recordatorios</span>
      </a>

      <!-- Divisor -->
      <div class="my-1 mx-2 h-px bg-white/[0.06]"></div>

      <!-- Papelera -->
      <a routerLink="/papelera"
        routerLinkActive="!bg-gradient-to-r !from-purple-500/25 !to-indigo-500/15 !text-white !border-purple-400/40 !shadow-[inset_0_1px_0_0_rgba(255,255,255,0.15),0_2px_12px_rgba(139,92,246,0.2)]"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-white/50
               border border-transparent hover:bg-white/[0.06] hover:text-white/80 transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18" />
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
          <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        </svg>
        <span>Papelera</span>
      </a>

    </nav>
  </aside>

  <!--  CONTENIDO PRINCIPAL  -->
  <main class="main-anim pt-16"
    [class.ml-64]="sidebarOpen()">
    <div class="p-8 max-w-7xl mx-auto">
      <router-outlet />
    </div>
  </main>

</div>
