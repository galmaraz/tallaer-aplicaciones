<div class="relative min-h-screen overflow-hidden text-white font-sans
            bg-gradient-to-br from-[#070418] via-[#0a0724] to-[#120833]">

  <!-- Capa de degradado radial (fija) para profundidad -->
  <div
    class="pointer-events-none fixed inset-0 z-0
              bg-[radial-gradient(ellipse_at_top_left,_rgba(99,102,241,0.28),_transparent_55%),radial-gradient(ellipse_at_bottom_right,_rgba(168,85,247,0.22),_transparent_55%),radial-gradient(ellipse_at_center,_rgba(59,130,246,0.10),_transparent_70%)]">
  </div>

  <!-- Blobs animados (drift diagonal) -->
  <div class="blob-group pointer-events-none fixed inset-0 -z-10">
    <div class="blob-1 absolute -top-40 -left-40 w-[700px] h-[700px] rounded-full
                bg-purple-500/60 blur-[90px] will-change-transform"></div>
    <div class="blob-2 absolute top-1/4 -right-60 w-[650px] h-[650px] rounded-full
                bg-indigo-500/55 blur-[90px] will-change-transform"></div>
    <div class="blob-3 absolute -bottom-40 left-1/3 w-[800px] h-[800px] rounded-full
                bg-fuchsia-600/50 blur-[100px] will-change-transform"></div>
    <div class="blob-4 absolute top-1/2 left-10 w-[450px] h-[450px] rounded-full
                bg-blue-500/55 blur-[80px] will-change-transform"></div>
    <div class="blob-5 absolute top-10 right-1/4 w-[400px] h-[400px] rounded-full
                bg-cyan-400/40 blur-[70px] will-change-transform"></div>
  </div>

  <!-- Grain sutil -->
  <div class="pointer-events-none fixed inset-0 z-10 opacity-[0.04] mix-blend-overlay"
    style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><filter id=%22n%22><feTurbulence type=%22fractalNoise%22 baseFrequency=%220.9%22/></filter><rect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/></svg>');">
  </div>

  <!-- HEADER (glass macOS intensificado) -->
  <header
    class="fixed top-0 inset-x-0 h-16 z-30 flex items-center gap-4 px-4
                 bg-white/[0.05] backdrop-blur-3xl backdrop-saturate-150
                 border-b border-white/[0.1]
                 shadow-[inset_0_1px_0_0_rgba(255,255,255,0.12),inset_0_-1px_0_0_rgba(255,255,255,0.02),0_8px_32px_rgba(0,0,0,0.35)]">
    <button class="p-2.5 rounded-xl hover:bg-white/[0.08] transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>

    <h1 class="font-bold text-lg leading-tight w-20
               bg-gradient-to-r from-purple-300 via-violet-300 to-indigo-300 bg-clip-text text-transparent">
      NoteFlow
    </h1>

    <!-- Search glass intensificado -->
    <div class="flex-1 max-w-2xl mx-auto relative">
      <svg class="absolute left-5 top-1/2 -translate-y-1/2 text-white/40 pointer-events-none"
        xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8" />
        <path d="m21 21-4.35-4.35" />
      </svg>
      <input type="text" placeholder="Buscar notas..." class="w-full pl-12 pr-5 py-3 rounded-full text-sm placeholder:text-white/40
               bg-white/[0.06] border border-white/[0.14]
               backdrop-blur-3xl backdrop-saturate-150
               shadow-[inset_0_1px_0_0_rgba(255,255,255,0.12),inset_0_-1px_2px_0_rgba(0,0,0,0.15)]
               focus:outline-none focus:border-purple-400/50 focus:bg-white/[0.09]
               focus:shadow-[inset_0_1px_0_0_rgba(255,255,255,0.15),0_0_0_3px_rgba(139,92,246,0.18)]
               transition-all" />
    </div>

    <button class="p-2.5 rounded-xl hover:bg-white/[0.08] transition-colors text-white/80">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
        <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
      </svg>
    </button>

    <button class="w-10 h-10 rounded-full overflow-hidden ring-2 ring-purple-400/40
                   bg-gradient-to-br from-purple-400 via-violet-500 to-indigo-600
                   shadow-lg shadow-purple-500/30">
    </button>
  </header>

  <!-- SIDEBAR (glass macOS intensificado) -->
  <aside
    class="fixed left-0 top-16 bottom-0 w-64 p-3 z-20
                bg-white/[0.04] backdrop-blur-3xl backdrop-saturate-150
                border-r border-white/[0.1]
                shadow-[inset_1px_0_0_0_rgba(255,255,255,0.08),inset_-1px_0_0_0_rgba(255,255,255,0.02),4px_0_32px_rgba(0,0,0,0.25)]">
    <nav class="flex flex-col gap-1 mt-2">
      <a routerLink="/" [routerLinkActiveOptions]="{exact: true}"
        routerLinkActive="!bg-gradient-to-r !from-purple-500/25 !to-indigo-500/15 !text-white !border-purple-400/40 !shadow-[inset_0_1px_0_0_rgba(255,255,255,0.15),0_2px_12px_rgba(139,92,246,0.2)]"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-white/70
                border border-transparent hover:bg-white/[0.06] hover:text-white transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5" />
          <path d="M9 18h6" />
          <path d="M10 22h4" />
        </svg>
        <span>Notes</span>
      </a>

      <a routerLink="/recordatorios"
        routerLinkActive="!bg-gradient-to-r !from-purple-500/25 !to-indigo-500/15 !text-white !border-purple-400/40 !shadow-[inset_0_1px_0_0_rgba(255,255,255,0.15),0_2px_12px_rgba(139,92,246,0.2)]"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-white/70
                border border-transparent hover:bg-white/[0.06] hover:text-white transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
          <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
        </svg>
        <span>Recordatorios</span>
      </a>

      <a routerLink="/etiquetas"
        routerLinkActive="!bg-gradient-to-r !from-purple-500/25 !to-indigo-500/15 !text-white !border-purple-400/40 !shadow-[inset_0_1px_0_0_rgba(255,255,255,0.15),0_2px_12px_rgba(139,92,246,0.2)]"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-white/70
                border border-transparent hover:bg-white/[0.06] hover:text-white transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />
        </svg>
        <span>Editar Etiquetas</span>
      </a>

      <a routerLink="/archivados"
        routerLinkActive="!bg-gradient-to-r !from-purple-500/25 !to-indigo-500/15 !text-white !border-purple-400/40 !shadow-[inset_0_1px_0_0_rgba(255,255,255,0.15),0_2px_12px_rgba(139,92,246,0.2)]"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-white/70
                border border-transparent hover:bg-white/[0.06] hover:text-white transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect width="20" height="5" x="2" y="3" rx="1" />
          <path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8" />
          <path d="M10 12h4" />
        </svg>
        <span>Archivados</span>
      </a>

      <a routerLink="/papelera"
        routerLinkActive="!bg-gradient-to-r !from-purple-500/25 !to-indigo-500/15 !text-white !border-purple-400/40 !shadow-[inset_0_1px_0_0_rgba(255,255,255,0.15),0_2px_12px_rgba(139,92,246,0.2)]"
        class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm text-white/70
                border border-transparent hover:bg-white/[0.06] hover:text-white transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 6h18" />
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
          <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
        </svg>
        <span>Papelera</span>
      </a>
    </nav>
  </aside>

  <!-- CONTENIDO DINÁMICO -->
  <main class="ml-64 pt-16">
    <div class="p-8 max-w-7xl mx-auto">
      <router-outlet />
    </div>
  </main>
</div>
