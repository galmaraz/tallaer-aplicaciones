<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
  data-backdrop="true"
  (click)="onBackdropClick($event)">

  <!-- Card -->
  <div class="relative w-full max-w-lg mx-4 rounded-3xl overflow-hidden
              bg-white/[0.07] border border-white/[0.15]
              backdrop-blur-3xl backdrop-saturate-150
              shadow-[inset_0_1px_0_0_rgba(255,255,255,0.15),0_24px_80px_rgba(0,0,0,0.6),0_0_60px_rgba(139,92,246,0.12)]">

    <!-- Glow line superior -->
    <div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-purple-400/60 to-transparent pointer-events-none"></div>

    <!-- Toolbar: undo | redo | persona+ | (espacio) | cerrar X -->
    <div class="flex items-center justify-between px-5 pt-4">
      <div class="flex items-center gap-0.5">

        <!-- Deshacer -->
        <button (click)="undo()" [disabled]="!canUndo() || saving()" title="Deshacer (Ctrl+Z)"
          class="p-2 rounded-xl transition-all"
          [class]="canUndo() && !saving()
            ? 'text-white/60 hover:text-white hover:bg-white/[0.08]'
            : 'text-white/20 cursor-not-allowed'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 7v6h6" /><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" />
          </svg>
        </button>

        <!-- Rehacer -->
        <button (click)="redo()" [disabled]="!canRedo() || saving()" title="Rehacer (Ctrl+Y)"
          class="p-2 rounded-xl transition-all"
          [class]="canRedo() && !saving()
            ? 'text-white/60 hover:text-white hover:bg-white/[0.08]'
            : 'text-white/20 cursor-not-allowed'">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 7v6h-6" /><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13" />
          </svg>
        </button>

        <!-- Asignar / persona+ -->
        <button (click)="onShareIconClick()" 
          class="p-2 rounded-xl text-white/35 hover:text-white/65 hover:bg-white/[0.08] transition-all"
          title="Compartir nota">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <line x1="19" x2="19" y1="8" y2="14" />
            <line x1="22" x2="16" y1="11" y2="11" />
          </svg>
        </button>
      </div>

      <!-- Cerrar X (toolbar) -->
      <button (click)="close()" [disabled]="saving()" title="Cerrar"
        class="p-2 rounded-xl transition-all"
        [class]="saving()
          ? 'text-white/20 cursor-not-allowed'
          : 'text-white/50 hover:text-white hover:bg-white/[0.08]'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18" /><path d="m6 6 12 12" />
        </svg>
      </button>
    </div>

    <!-- Título -->
    <div class="px-5 pt-4">
      <input type="text" placeholder="Título" autocomplete="off"
        [value]="title()"
        (input)="onTitleChange($any($event.target).value)"
        (blur)="onTitleBlur()"
        class="w-full bg-transparent text-white font-semibold text-xl
               placeholder:text-white/30 focus:outline-none" />
    </div>

    <!-- Divisor -->
    <div class="mx-5 mt-3 h-px bg-white/[0.08]"></div>

    <!-- Lista de elementos (scrollable) -->
    <div class="px-5 pt-3 max-h-64 overflow-y-auto space-y-1">
      @for (item of items(); track $index) {
        <div class="flex items-center gap-3 py-1 group/item">

          <!-- Checkbox -->
          <button (click)="toggleItem($index)"
            class="shrink-0 w-5 h-5 rounded-md border flex items-center justify-center transition-all"
            [class]="item.checked
              ? 'bg-gradient-to-br from-purple-400 to-purple-600 border-transparent shadow-[0_2px_8px_rgba(139,92,246,0.4)]'
              : 'border-white/25 bg-white/[0.03] hover:border-purple-400/60'">
            @if (item.checked) {
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.5"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12" />
              </svg>
            }
          </button>

          <!-- Texto del elemento -->
          <input type="text" placeholder="Elemento de la lista..." autocomplete="off"
            [value]="item.text"
            (input)="updateItemText($index, $any($event.target).value)"
            (blur)="onItemBlur()"
            class="flex-1 bg-transparent text-sm focus:outline-none placeholder:text-white/25 transition-colors"
            [class]="item.checked ? 'text-white/35 line-through' : 'text-white/85'" />

          <!-- Quitar elemento X -->
          <button (click)="removeItem($index)"
            class="shrink-0 p-1 rounded-lg transition-all opacity-0 group-hover/item:opacity-100
                   text-white/40 hover:text-white/80 hover:bg-white/[0.08]">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6 6 18" /><path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
      }
    </div>

    <!-- + Agregar elemento -->
    <div class="px-5 pt-2 pb-1">
      <button (click)="addItem()"
        class="flex items-center gap-2 text-sm text-purple-300/60 hover:text-purple-200
               py-1 px-2 rounded-lg hover:bg-white/[0.05] transition-all">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14" /><path d="M5 12h14" />
        </svg>
        Agregar elemento
      </button>
    </div>

    <!-- Footer: botón Cerrar -->
    <div class="flex items-center justify-end gap-3 px-5 py-3 mt-1 border-t border-white/[0.06]">
      @if (saving()) {
        <span class="text-xs text-white/35 animate-pulse">Guardando...</span>
      }
      <button (click)="close()" [disabled]="saving()"
        class="px-5 py-2 rounded-xl text-sm font-medium border transition-all"
        [class]="saving()
          ? 'text-white/25 border-white/[0.08] cursor-not-allowed'
          : 'text-white/65 border-white/[0.12] hover:text-white hover:bg-white/[0.08] hover:border-white/25'">
        Cerrar
      </button>
    </div>

    <!-- Glow line inferior -->
    <div class="absolute inset-x-0 bottom-0 h-px bg-gradient-to-r from-transparent via-purple-400/30 to-transparent pointer-events-none"></div>
  </div>
</div>

@if (showShareModal()) {
  <app-user-selector 
    (userSelected)="confirmarCompartir($event)" 
    (canceled)="showShareModal.set(false)">
  </app-user-selector>
}

@if (showToast()) {
  <div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[200] animate-in fade-in slide-in-from-bottom-5 duration-300">
    <div class="flex items-center gap-3 px-5 py-3 rounded-2xl bg-[#1c1c1e]/80 backdrop-blur-xl border border-white/20 shadow-[0_20px_50px_rgba(0,0,0,0.5)]">
      <div class="w-6 h-6 rounded-full bg-purple-500/20 flex items-center justify-center">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="3">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <span class="text-sm text-white/90 font-medium tracking-wide">Nota compartida con éxito</span>
    </div>
  </div>
}
