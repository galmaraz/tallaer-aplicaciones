<div class="fixed inset-0 z-[110] flex items-center justify-center bg-black/70 backdrop-blur-md animate-in fade-in duration-200">
  <div class="relative w-full max-w-[320px] bg-[#1c1c1e] border border-white/10 rounded-3xl p-5 shadow-2xl overflow-hidden">
    
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-white font-medium text-sm tracking-tight px-1">Compartir nota</h3>
      <button (click)="canceled.emit()" class="text-white/20 hover:text-white transition-colors">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="relative mb-4">
      <input type="text" placeholder="Buscar persona..." 
             (input)="searchTerm.set($any($event.target).value)"
             class="w-full bg-white/[0.05] border border-white/10 rounded-xl py-2 px-3 text-xs text-white placeholder:text-white/20 focus:outline-none focus:border-purple-500/50 transition-all">
    </div>
    
    <div class="space-y-1 max-h-64 overflow-y-auto pr-1 custom-scrollbar">
      @for (u of filteredUsers(); track u.id) {
        <button (click)="select(u.id)" 
                class="w-full flex items-center gap-3 p-2.5 rounded-2xl hover:bg-white/[0.07] active:scale-[0.98] transition-all group text-left border border-transparent hover:border-white/5">
          <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-500/20 to-blue-500/20 flex items-center justify-center text-[10px] text-purple-300 font-bold border border-purple-500/30">
            {{ u.name.substring(0,2).toUpperCase() }}
          </div>
          <div class="flex flex-col">
            <span class="text-sm text-white/90 group-hover:text-white font-medium">{{ u.name }}</span>
            <span class="text-[10px] text-white/40">{{ u.email }}</span>
          </div>
        </button>
      } @empty {
        <div class="py-10 text-center">
          <p class="text-xs text-white/20">No se encontraron usuarios</p>
        </div>
      }
    </div>

    <div class="mt-4 pt-3 border-t border-white/5 flex justify-end">
      <button (click)="canceled.emit()" class="text-xs text-white/40 hover:text-white transition-colors px-2 py-1">
        Cancelar
      </button>
    </div>
  </div>
</div>
