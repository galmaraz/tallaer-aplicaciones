<div class="relative">
  <button (click)="toggle()" [title]="activeUser()?.name ?? 'Seleccionar usuario'" class="w-10 h-10 rounded-full shrink-0 overflow-hidden ring-2 transition-all
           bg-gradient-to-br from-purple-400 via-violet-500 to-indigo-600
           shadow-lg shadow-purple-500/30
           flex items-center justify-center text-white text-sm font-semibold"
    [class]="isOpen() ? 'ring-purple-400/80' : 'ring-purple-400/40 hover:ring-purple-400/70'">
    @if (activeUser(); as user) {
    <span>{{ getInitials(user.name) }}</span>
    } @else {
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="4" />
      <path d="M4 21v-1a8 8 0 0 1 16 0v1" />
    </svg>
    }
  </button>

  @if (isOpen()) {
  <div class="absolute right-0 top-12 w-72 z-50 rounded-2xl overflow-hidden
                bg-[#0f0820]/85 backdrop-blur-3xl backdrop-saturate-150
                border border-white/[0.16]
                shadow-[inset_0_1px_0_0_rgba(255,255,255,0.14),0_20px_50px_rgba(0,0,0,0.6)]">
    <div class="px-4 py-3 border-b border-white/[0.08]">
      <p class="text-[11px] uppercase tracking-wider text-white/40 font-semibold">Cambiar usuario</p>
    </div>
    <ul class="max-h-80 overflow-y-auto py-1">
      @for (user of users(); track user.id) {
      <li>
        <button (click)="selectUser(user)"
          class="w-full flex items-center gap-3 px-4 py-3 text-left transition-all hover:bg-white/[0.06]"
          [class]="user.id === currentUserId() ? 'bg-purple-500/10' : ''">
          <div class="w-9 h-9 rounded-full flex items-center justify-center
                          text-xs font-semibold text-white shrink-0
                          bg-gradient-to-br from-purple-400 via-violet-500 to-indigo-600
                          ring-1 ring-white/20">
            {{ getInitials(user.name) }}
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-white truncate">{{ user.name }}</p>
            <p class="text-xs text-white/50 truncate">{{ user.email }}</p>
          </div>
          @if (user.id === currentUserId()) {
          <svg class="text-purple-300 shrink-0" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12" />
          </svg>
          }
        </button>
      </li>
      }
    </ul>
  </div>
  }
</div>
